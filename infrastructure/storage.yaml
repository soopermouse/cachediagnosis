# cachemed/infrastructure/storage.yaml
AWSTemplateFormatVersion: '2010-09-09'
Description: 'Cachemed Storage Infrastructure'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
  DeletionProtection:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'

Resources:
  # KMS Key for S3 encryption
  StorageKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub 'KMS key for Cachemed ${Environment} storage'
      Enabled: true
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'

  # S3 Bucket for file storage
  FilesBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub 'cachemed-${Environment}-files'
      VersioningConfiguration:
        Status: Enabled
      ServerSideEncryptionConfiguration:
        - ServerSideEncryptionByDefault:
            SSEAlgorithm: aws:kms
            KMSMasterKeyID: !Ref StorageKMSKey
      LifecycleConfiguration:
        Rules:
          - Id: MoveToInfrequentAccess
            Status: Enabled
            Prefix: patients/
            Transitions:
              - Days: 30
                StorageClass: STANDARD_IA
          - Id: MoveToGlacier
            Status: Enabled
            Prefix: patients/
            Transitions:
              - Days: 90
                StorageClass: GLACIER
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 365
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - GET
              - PUT
              - POST
              - DELETE
            AllowedOrigins:
              - '*'
            ExposedHeaders:
              - ETag
            MaxAge: 3000
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !Ref StorageKMSKey
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: Cachemed

  # Bucket Policy
  FilesBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FilesBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureConnections
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !Sub '${FilesBucket.Arn}/*'
              - !Sub '${FilesBucket.Arn}'
            Condition:
              Bool:
                aws:SecureTransport: false

Outputs:
  FilesBucketName:
    Description: Files Bucket Name
    Value: !Ref FilesBucket
  FilesBucketArn:
    Description: Files Bucket ARN
    Value: !GetAtt FilesBucket.Arn
  StorageKMSKeyId:
    Description: Storage KMS Key ID
    Value: !Ref StorageKMSKey